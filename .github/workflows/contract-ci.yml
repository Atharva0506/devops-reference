name: Contract CI

on:
  pull_request:
    paths:
      - "contracts/**"
      - "foundry.toml"
      - ".github/workflows/contract-ci.yml"

env:
  FOUNDRY_PROFILE: ci

jobs:
  forge-test:
    name: Forge Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Build contracts
        run: forge build

      - name: Run tests
        run: forge test -vvv

  slither:
    name: Slither Analysis
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Build contracts
        run: forge build

      - name: Install Slither
        run: pip3 install slither-analyzer

      - name: Run Slither
        run: slither . --json slither-output.json --config-file .slither.conf || true

      - name: Parse findings and post PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Generate the comment markdown
          python3 tools/parse-slither.py slither-output.json > slither-comment.md
          EXIT_CODE=$?

          # Post as PR comment
          gh pr comment "$PR_NUMBER" --body-file slither-comment.md

          # Exit with the parse script's code (1 if HIGH findings)
          exit $EXIT_CODE

  gas-report:
    name: Gas Delta Report
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Generate PR snapshot
        run: forge snapshot --snap .gas-snapshot-pr

      - name: Generate base snapshot
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}
          forge snapshot --snap .gas-snapshot-base
          git checkout ${{ github.event.pull_request.head.sha }}

      - name: Compute gas delta and post PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 tools/gas-delta.py .gas-snapshot-base .gas-snapshot-pr > gas-comment.md
          gh pr comment "$PR_NUMBER" --body-file gas-comment.md

  gitleaks:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
