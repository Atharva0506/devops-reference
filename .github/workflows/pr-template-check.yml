name: PR Template Check

on:
  pull_request:
    types: [opened, edited]

jobs:
  check-template:
    name: Verify PR Template
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Check PR follows AOSSIE template
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';

            // Required sections from AOSSIE PR template
            const checks = [
              { section: 'Addressed Issues', pattern: '### Addressed Issues' },
              { section: 'AI Usage Disclosure', pattern: '### AI Usage Disclosure' },
              { section: 'Checklist', pattern: '## Checklist' },
            ];

            // Check that at least one AI checkbox is checked
            const aiChecked =
              body.includes('[x] This PR does not contain AI-generated code at all') ||
              body.includes('[x] This PR contains AI-generated code') ||
              body.includes('[X] This PR does not contain AI-generated code at all') ||
              body.includes('[X] This PR contains AI-generated code');

            const missingSections = checks.filter(c => !body.includes(c.pattern));
            const problems = [];

            if (missingSections.length > 0) {
              problems.push(`Missing required sections:\n${missingSections.map(s => `- ${s.section}`).join('\n')}`);
            }
            if (missingSections.length === 0 && !aiChecked) {
              problems.push('Neither AI Usage checkbox is checked. Please check one.');
            }

            const labelName = 'missing-pr-template';

            if (problems.length > 0) {
              // Create label if it doesn't exist
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                });
              } catch (e) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                  color: 'e74c3c',
                  description: 'PR does not follow the AOSSIE PR template',
                });
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: [labelName],
              });

              const problemList = problems.map(p => `- ${p}`).join('\n');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `⚠️ **PR Template Check Failed**\n\n${problemList}\n\nPlease update the PR description to follow the [AOSSIE PR template](/.github/pull_request_template.md).`,
              });

              core.setFailed(`PR template issues found: ${problems.length}`);
            } else {
              // Remove label if PR is now compliant
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  name: labelName,
                });
              } catch (e) {
                // Label wasn't there
              }
            }
