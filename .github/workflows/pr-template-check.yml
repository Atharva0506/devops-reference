name: PR Template Check

on:
  pull_request:
    types: [opened, edited]

jobs:
  check-template:
    name: Verify PR Template
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Check PR follows template
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';

            // Required sections from the PR template
            const requiredSections = [
              '## Description',
              '## Type of Change',
              '## Changes Made',
              '## Testing',
              '## Checklist',
            ];

            const missingSections = requiredSections.filter(
              section => !body.includes(section)
            );

            const labelName = 'missing-pr-template';

            if (missingSections.length > 0) {
              // Add label
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  labels: [labelName],
                });
              } catch (e) {
                // Label might not exist yet, create it
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: labelName,
                    color: 'e74c3c',
                    description: 'PR does not follow the standard template',
                  });
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.payload.pull_request.number,
                    labels: [labelName],
                  });
                } catch (labelError) {
                  core.warning(`Could not create/add label: ${labelError.message}`);
                }
              }

              // Post a comment
              const missingList = missingSections.map(s => `- ${s}`).join('\n');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `⚠️ **PR Template Check Failed**\n\nThis PR is missing the following required sections:\n\n${missingList}\n\nPlease update the PR description to follow the [standard template](/.github/pull_request_template.md).`,
              });

              core.setFailed(`PR is missing ${missingSections.length} required section(s).`);
            } else {
              // Remove label if it exists
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  name: labelName,
                });
              } catch (e) {
                // Label wasn't there, that's fine
              }
            }
