name: Merge Conflict Check

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]

jobs:
  conflict-check:
    name: Check Merge Conflicts
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for merge conflicts
        uses: actions/github-script@v7
        with:
          script: |
            // Only run on PRs
            if (!context.payload.pull_request) return;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const labelName = 'has-merge-conflict';

            if (pr.mergeable === false) {
              // Create label if needed
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                });
              } catch (e) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                  color: 'ff6600',
                  description: 'PR has merge conflicts that need to be resolved',
                });
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: [labelName],
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: '⚠️ **Merge Conflict Detected**\n\nThis PR has merge conflicts with the base branch. Please rebase or merge `main` into your branch to resolve them.\n\n```bash\ngit fetch origin\ngit rebase origin/main\n# or\ngit merge origin/main\n```',
              });

              core.setFailed('PR has merge conflicts.');
            } else if (pr.mergeable === true) {
              // Remove label if conflicts resolved
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: labelName,
                });
              } catch (e) {
                // Label wasn't there
              }
            }
            // If mergeable is null, GitHub is still computing. Skip.
