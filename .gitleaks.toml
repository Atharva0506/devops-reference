# Gitleaks configuration for StabilityNexus repositories.
# Detects private keys, API keys, and sensitive environment variables.

title = "StabilityNexus Gitleaks Config"

[[rules]]
    id = "ethereum-private-key"
    description = "Ethereum private key (64 hex characters)"
    regex = '''(?i)(?:private[_-]?key|priv[_-]?key)\s*[:=]\s*["']?(?:0x)?[0-9a-fA-F]{64}["']?'''
    tags = ["key", "ethereum"]

[[rules]]
    id = "raw-hex-private-key"
    description = "Raw 64-character hex string in key context"
    regex = '''(?:0x)[0-9a-fA-F]{64}'''
    tags = ["key", "ethereum"]
    [rules.allowlist]
        paths = [
            '''test/.*''',
            '''script/.*''',
            '''foundry\.toml''',
        ]

[[rules]]
    id = "infura-api-key"
    description = "Infura API key"
    regex = '''(?i)(?:infura)[_-]?(?:api)?[_-]?(?:key|token|secret)\s*[:=]\s*["']?[0-9a-f]{32}["']?'''
    tags = ["key", "infura"]

[[rules]]
    id = "alchemy-api-key"
    description = "Alchemy API key"
    regex = '''(?i)(?:alchemy)[_-]?(?:api)?[_-]?(?:key|token|secret)\s*[:=]\s*["']?[a-zA-Z0-9_-]{32,}["']?'''
    tags = ["key", "alchemy"]

[[rules]]
    id = "mnemonic-phrase"
    description = "Mnemonic seed phrase"
    regex = '''(?i)(?:mnemonic|seed[_-]?phrase)\s*[:=]\s*["']?(?:\w+\s+){11,23}\w+["']?'''
    tags = ["key", "mnemonic"]

[[rules]]
    id = "env-sensitive-variable"
    description = "Sensitive .env variable assignment"
    regex = '''(?i)(?:PRIVATE_KEY|MNEMONIC|API_SECRET|SECRET_KEY|DEPLOYER_KEY)\s*=\s*.+'''
    tags = ["env", "secret"]
    [rules.allowlist]
        paths = [
            '''\.env\.example''',
            '''\.env\.template''',
            '''docs/.*''',
        ]

[allowlist]
    paths = [
        '''.gitleaks.toml''',
        '''node_modules/.*''',
        '''out/.*''',
        '''cache/.*''',
    ]
