services:
  # Local EVM node
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil", "--host", "0.0.0.0", "--block-time", "2"]
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 2s
      timeout: 5s
      retries: 10

  # Deploy contracts to Anvil after it's ready
  deployer:
    image: ghcr.io/foundry-rs/foundry:latest
    depends_on:
      anvil:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app
    entrypoint: >
      sh -c "
        forge build &&
        forge script script/Deploy.s.sol --rpc-url http://anvil:8545 --broadcast --private-key 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80 &&
        echo 'Contracts deployed to Anvil.'
      "
