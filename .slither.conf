[filter]
    # Suppress known false positives in test files and scripts
    [filter.allowlist]
        paths = [
            '''test/.*''',
            '''script/.*''',
        ]

# Slither configuration for StabilityNexus contracts.
#
# Suppressed detectors with rationale:
#
# reentrancy-benign: False positives on OpenZeppelin ReentrancyGuard
# patterns where the reentrancy is blocked by the modifier but
# Slither still flags the state write order.
#
# events-maths: False positives on arithmetic operations inside
# view/pure functions that emit events for logging only.
#
# assembly: OpenZeppelin uses inline assembly in Address.sol,
# StorageSlot.sol, and other low-level libraries. These are
# audited upstream and not worth flagging per-repo.
detectors_to_exclude = "reentrancy-benign,events-maths,assembly"

# Always output JSON for CI parsing
json = "slither-output.json"

# Exclude test and script directories from analysis
filter_paths = "test/,script/"
